<!DOCTYPE html>
<html>
<head>
<title>System Scanner</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
margin:0;
transition:0.5s;
}

canvas{
position:fixed;
top:0;
left:0;
}

#content{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:22px;
}

#bar{
width:0%;
height:20px;
background:#00ff00;
margin-top:20px;
transition:0.5s;
}

#progress{
width:60%;
margin:auto;
border:1px solid #00ff00;
}

.redmode{
background:#200000;
color:#ff0000;
}

.redmode #bar{
background:#ff0000;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="content">

<div id="text">Initializing System Scan...</div>

<div id="progress">
<div id="bar"></div>
</div>

</div>

<script>

/* MATRIX EFFECT */

const canvas = document.getElementById("matrix")
const ctx = canvas.getContext("2d")

canvas.height = window.innerHeight
canvas.width = window.innerWidth

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const fontSize = 14
const columns = canvas.width / fontSize
const drops = []

for(let x = 0; x < columns; x++)
drops[x] = 1

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle = "#0f0"
ctx.font = fontSize + "px monospace"

for(let i = 0; i < drops.length; i++){

let char = letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(char,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0

drops[i]++

}

}

setInterval(draw,33)



/* PROGRESS BAR */

let bar = document.getElementById("bar")
let text = document.getElementById("text")

let width = 0

let interval = setInterval(frame,120)

function frame(){

if(width >= 100){

clearInterval(interval)

document.body.classList.add("redmode")

text.innerHTML="⚠ SECURITY ALERT<br>Simulation detected"

setTimeout(()=>{
text.innerHTML="😎 Relax! This was a hacker style simulation."
},3000)

}

else{

width++

bar.style.width = width + "%"

if(width==20) text.innerHTML="Scanning network..."
if(width==40) text.innerHTML="Decrypting packets..."
if(width==60) text.innerHTML="Analyzing system..."
if(width==80) text.innerHTML="Finalizing scan..."

}

}

</script>

</body>
</html>
