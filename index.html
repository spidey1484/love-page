<!DOCTYPE html>
<html>
<head>
<title>System Scanner</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
margin:0;
transition:0.6s;
}

canvas{
position:fixed;
top:0;
left:0;
}

#content{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:24px;
z-index:2;
}

#progress{
width:60%;
margin:auto;
border:1px solid #00ff00;
}

#bar{
width:0%;
height:20px;
background:#00ff00;
margin-top:20px;
transition:0.3s;
}

/* RED ALERT MODE */

.redmode{
background:#120000;
color:#ff0000;
}

.redmode #bar{
background:#ff0000;
border-color:#ff0000;
}

/* GLITCH EFFECT */

.glitch{
animation:glitch 0.2s infinite;
}

@keyframes glitch{

0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(2px,-2px)}
60%{transform:translate(-2px,0)}
80%{transform:translate(2px,2px)}
100%{transform:translate(0)}

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="content">

<div id="text">Initializing System Scan...</div>

<div id="progress">
<div id="bar"></div>
</div>

</div>

<script>

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]

for(let i=0;i<columns;i++){
drops[i]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0f0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let char=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(char,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,33)



/* SCANNER */

let bar=document.getElementById("bar")
let text=document.getElementById("text")

let width=0

let interval=setInterval(scan,120)

function scan(){

if(width>=100){

clearInterval(interval)

/* RED MODE */

document.body.classList.add("redmode")
text.classList.add("glitch")

text.innerHTML="⚠ SECURITY WARNING<br>Unauthorized access detected"

/* WAIT 3 SEC */

setTimeout(function(){

text.classList.remove("glitch")
text.innerHTML="😎 Relax bro... this was a hacker simulation prank"

document.body.style.background="black"
document.body.style.color="#00ff00"

},3000)

}

else{

width++

bar.style.width=width+"%"

if(width==20) text.innerHTML="Scanning network..."
if(width==40) text.innerHTML="Decrypting packets..."
if(width==60) text.innerHTML="Analyzing system..."
if(width==80) text.innerHTML="Finalizing scan..."

}

}

</script>

</body>
</html>
