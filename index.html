<!DOCTYPE html>
<html>
<head>
<title>System Alert</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

#popup{
border:2px solid #00ff00;
padding:30px;
width:420px;
text-align:center;
box-shadow:0 0 20px #00ff00;
}

#barbox{
border:1px solid #00ff00;
margin-top:15px;
}

#bar{
height:18px;
width:0%;
background:#00ff00;
}
</style>

</head>

<body>

<div id="popup">
<div id="text">Initializing system scan...</div>

<div id="barbox">
<div id="bar"></div>
</div>
</div>

<script>

let bar=document.getElementById("bar")
let text=document.getElementById("text")
let width=0

let scan=setInterval(function(){

if(width>=100){
clearInterval(scan)
text.innerHTML="Security scan complete."
}
else{
width++
bar.style.width=width+"%"

if(width==25) text.innerHTML="Scanning browser..."
if(width==50) text.innerHTML="Analyzing connection..."
if(width==75) text.innerHTML="Checking security..."
}

},100)

</script>

</body>
</html>
